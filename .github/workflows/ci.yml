name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  JJ_VERSION: "0.42.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Integration tests shell out to jj
      - name: Install jj
        run: |
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar xz -C /usr/local/bin ./jj
          jj --version

      - name: Configure git identity (used by test fixtures)
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main

      - name: Build (deny warnings)
        run: cargo build --all-targets
        env:
          RUSTFLAGS: "-D warnings"

      - name: Test
        run: cargo test
